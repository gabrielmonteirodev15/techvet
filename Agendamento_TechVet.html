<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" href="Estilo_TechVet.css">
</head>
<body>
    <main>
        <header class="cabeca">
        <div class="logo">
            <img src="logo.png" alt="">
        </div>

        <nav class="navegacao">
            <a href="">Home</a>
            <a href="">Cadastro</a>
            <a href="">Agendamento</a>
        </nav>
    </header>
        <div class="img-container">
                    <img src="img_agendamento.png" width="120">
                </div>
        <form id="formAgendamento">
             <fieldset>
                <legend>Agendamento</legend>
                
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" placeholder="Digite o nome completo do dono" id="nome" name="nome" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" placeholder="Digite o edereço de e-mail do dono" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="paciente">Paciente:</label>
                    <input type="text" placeholder="Digite o nome do pet" id="paciente" name="paciente" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <input type="text" placeholder="Descreva o problema do pet" id="descricao" name="descricao" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group half">
                    <label for="data">Data:</label>
                    <input type="date" id="data" name="data" required />
                </div>
                <div class="form-group half">
                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" name="hora" required />
                </div>
                </div>  
                
            </fieldset>
        </form>
        <div class="form-group">    
            <button id="agendarBtn" type="button">AGENDAR</button>
        </div> 

        <footer>
        <div>
            <h2>TechVet</h2>
            <h3>Clinica de Animais</h3>
        </div>
        <div class="footer-2">
            <div class="footer-item2">
                <p><strong>INSTITUCIONAIS</strong></p>
                <p><a href="">Equipe</a></p>
                <p><a href="">Contato</a></p>
                <p><a href="">Politica de Privacidade</a></p>
            </div>
            <div>
                <p><strong>Contatos</strong></p>
                <p>Telefone: (12) 3631-5487</p>
                <p><a href="">techvet@clinicapet.com.br</a></p>
                <span>
                    <p>Atendimento: Seg à Sex - 24hrs,</p>
                    <p>Sábado - 08h às 12h</p>
                </span>
            </div>
        </div>
    </footer>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
    emailjs.init("eslDHbej7U2gJRwWA");

    document.getElementById("agendarBtn").addEventListener("click", (event) => {
      event.preventDefault();

      const nome = document.getElementById("nome").value;
      const paciente = document.getElementById("paciente").value;
      const email = document.getElementById("email").value;
      const descricao = document.getElementById("descricao").value;
      const data = document.getElementById("data").value;
      const hora = document.getElementById("hora").value;

      const templateParams = {
        nome,
        paciente,
        email,
        data,
        hora,
        descricao,
      };

      emailjs.send("service_fzn4hg8", "template_rey1c6l", templateParams)
        .then((response) => {
          alert("Agendamento enviado com sucesso!");
          console.log("SUCESSO:", response);
        })
        .catch((error) => {
          alert("Erro ao enviar o agendamento. Tente novamente.");
          console.error("ERRO:", error);
        });
    });
  </script>
</body>
</html>
